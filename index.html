<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Feedback — Downing Students</title>
  <style>
    :root {
      --brand-black:  #0A1F1A;
      --brand-green:  #177654;
      --brand-offwhite: #FCF3EA;
      --brand-gold:   #F9B023;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--brand-offwhite);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(10,31,26,0.12);
      padding: 40px 36px;
      width: 100%;
      max-width: 560px;
    }

    .logo {
      display: block;
      height: 44px;
      width: auto;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--brand-black);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--brand-black);
      margin-bottom: 5px;
    }

    .field { margin-bottom: 20px; }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9375rem;
      color: #111827;
      background: #fff;
      transition: border-color .15s;
      outline: none;
    }

    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--brand-green);
      box-shadow: 0 0 0 3px rgba(13,35,24,0.10);
    }

    textarea { resize: vertical; min-height: 120px; }

    /* Chat ID validation states */
    #chatId.valid   { border-color: #16a34a; }
    #chatId.invalid { border-color: #dc2626; }

    .chat-id-status {
      font-size: 0.78rem;
      margin-top: 5px;
      min-height: 18px;
    }
    .chat-id-status.ok  { color: #16a34a; }
    .chat-id-status.err { color: #dc2626; }
    .chat-id-status.checking { color: #6b7280; }

    /* Screenshot upload */
    .upload-area {
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .upload-area:hover { border-color: var(--brand-green); background: var(--brand-offwhite); }
    .upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { font-size: 2rem; margin-bottom: 6px; }
    .upload-text { font-size: 0.85rem; color: #6b7280; }
    .upload-text strong { color: var(--brand-green); }

    #preview-wrap { margin-top: 12px; display: none; }
    #preview-wrap img {
      max-width: 100%; max-height: 220px; border-radius: 6px;
      border: 1.5px solid #e5e7eb;
    }
    .remove-btn {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.78rem;
      color: #dc2626;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
    }

    /* Submit button */
    .btn {
      width: 100%;
      padding: 13px;
      background: var(--brand-black);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      margin-top: 8px;
    }
    .btn:hover:not(:disabled) { background: var(--brand-green); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Toast messages */
    #toast {
      display: none;
      margin-top: 18px;
      padding: 13px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    #toast.success { background: #f0fdf4; color: #15803d; border: 1.5px solid #bbf7d0; }
    #toast.error   { background: #fef2f2; color: #b91c1c; border: 1.5px solid #fecaca; }

    .required { color: #dc2626; }
  </style>
</head>
<body>
<div class="card">

  <img src="logo.png" alt="Downing Students" class="logo" />

  <h1>Chatbot Feedback</h1>
  <p class="subtitle">Found an issue or have a suggestion? Submit it here. One report per chat session.</p>

  <form id="feedback-form" novalidate>

    <!-- Name -->
    <div class="field">
      <label for="name">Your Name <span class="required">*</span></label>
      <input type="text" id="name" name="name" list="name-list" placeholder="Select or type your name…" autocomplete="off" required />
      <datalist id="name-list">
        <option>Catherine Hollywood</option>
        <option>Hannah Duffy</option>
        <option>Harrison Ramsden</option>
        <option>Ivy Liu</option>
        <option>Jade Mallia</option>
        <option>Jemma Curzon</option>
        <option>Keisuke Suzuki</option>
        <option>Lauren Sergeant</option>
        <option>Lynne Doyle</option>
        <option>Michelle Winrow</option>
        <option>Rebecca Maher</option>
        <option>Sarah Duckworth</option>
        <option>Yuqi Chen</option>
      </datalist>
    </div>

    <!-- Chat Session ID -->
    <div class="field">
      <label for="chatId">Chat Session ID <span class="required">*</span></label>
      <input
        type="text"
        id="chatId"
        name="chatId"
        placeholder="e.g. 275532185"
        autocomplete="off"
        required
      />
      <div class="chat-id-status" id="chatIdStatus"></div>
    </div>

    <!-- Category -->
    <div class="field">
      <label for="category">Issue Category</label>
      <select id="category" name="category">
        <option value="" selected>Select a category…</option>
        <option value="No issues">No issues — chatbot performed well</option>
        <option value="Incorrect information">Incorrect information — AI gave wrong or inaccurate answers</option>
        <option value="Repetitive responses">Repetitive responses — AI kept looping or using the same templates</option>
        <option value="Not answering properly">Not answering properly — AI avoided or missed the actual question</option>
        <option value="Failed to escalate">Failed to escalate — AI should have handed off to a human</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <!-- Feedback -->
    <div class="field">
      <label for="feedback">Feedback <span class="required">*</span></label>
      <textarea
        id="feedback"
        name="feedback"
        placeholder="Describe the issue or suggestion. What did the chatbot do? What did you expect?"
        required
      ></textarea>
    </div>

    <!-- Screenshot -->
    <div class="field">
      <label>Screenshot</label>
      <div class="upload-area" id="upload-area">
        <input type="file" id="screenshot" accept="image/*" />
        <div class="upload-icon">📎</div>
        <div class="upload-text"><strong>Click to upload</strong> or drag &amp; drop</div>
        <div class="upload-text" style="margin-top:3px">PNG, JPG, GIF, WebP</div>
      </div>
      <div id="preview-wrap">
        <img id="preview-img" src="" alt="Screenshot preview" />
        <br />
        <button type="button" class="remove-btn" id="remove-screenshot">Remove screenshot</button>
      </div>
    </div>

    <button type="submit" class="btn" id="submit-btn">Submit Feedback</button>
    <div id="toast"></div>

  </form>
</div>

<script>
  // ============================================================
  // ✏️  PASTE YOUR APPS SCRIPT WEB APP URL HERE
  // ============================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7EdlVll1dm5hkHGUrC_iYz0_MroXeOs7gqS4Q2zXiXrdbsCCYsMlI2QdooZDujZ6R/exec';
  // ============================================================

  // ----------------------------------------------------------
  // Saved names (localStorage) — persist custom names across sessions
  // ----------------------------------------------------------
  const KNOWN_NAMES = [
    'Catherine Hollywood','Hannah Duffy','Harrison Ramsden','Ivy Liu',
    'Jade Mallia','Jemma Curzon','Keisuke Suzuki','Lauren Sergeant',
    'Lynne Doyle','Michelle Winrow','Rebecca Maher','Sarah Duckworth','Yuqi Chen'
  ];

  function getSavedNames() {
    try { return JSON.parse(localStorage.getItem('feedback_saved_names') || '[]'); }
    catch { return []; }
  }

  function saveNewName(name) {
    if (!name || KNOWN_NAMES.includes(name)) return;
    const saved = getSavedNames();
    if (saved.includes(name)) return;
    saved.push(name);
    saved.sort((a, b) => a.localeCompare(b));
    localStorage.setItem('feedback_saved_names', JSON.stringify(saved));
    addNameToDatalist(name);
  }

  function addNameToDatalist(name) {
    const list = document.getElementById('name-list');
    // Avoid duplicates in the datalist
    const existing = Array.from(list.options).map(o => o.value);
    if (existing.includes(name)) return;
    const opt = document.createElement('option');
    opt.value = name;
    list.appendChild(opt);
    // Re-sort datalist options alphabetically
    const sorted = Array.from(list.options).sort((a, b) => a.value.localeCompare(b.value));
    list.innerHTML = '';
    sorted.forEach(o => list.appendChild(o));
  }

  // Load any previously saved custom names into the datalist on page load
  getSavedNames().forEach(addNameToDatalist);

  const form           = document.getElementById('feedback-form');
  const chatIdInput    = document.getElementById('chatId');
  const chatIdStatus   = document.getElementById('chatIdStatus');
  const screenshotInput= document.getElementById('screenshot');
  const previewWrap    = document.getElementById('preview-wrap');
  const previewImg     = document.getElementById('preview-img');
  const removeBtn      = document.getElementById('remove-screenshot');
  const submitBtn      = document.getElementById('submit-btn');
  const toast          = document.getElementById('toast');

  let screenshotDataUrl  = null;
  let screenshotFilename = null;
  let chatIdValid        = null; // null = unchecked, true = ok, false = duplicate
  let checkTimer         = null;

  // ----------------------------------------------------------
  // Chat ID duplicate check (debounced, 600ms after typing stops)
  // ----------------------------------------------------------
  chatIdInput.addEventListener('input', () => {
    const val = chatIdInput.value.trim();
    chatIdInput.classList.remove('valid', 'invalid');
    chatIdStatus.className = 'chat-id-status';
    chatIdStatus.textContent = '';
    chatIdValid = null;
    clearTimeout(checkTimer);

    if (!val) return;

    chatIdStatus.className = 'chat-id-status checking';
    chatIdStatus.textContent = 'Checking…';

    checkTimer = setTimeout(() => checkChatId(val), 600);
  });

  async function checkChatId(id) {
    try {
      const url = `${APPS_SCRIPT_URL}?action=check&chatId=${encodeURIComponent(id)}`;
      const res  = await fetch(url);
      const data = await res.json();

      if (data.exists) {
        chatIdInput.classList.add('invalid');
        chatIdStatus.className = 'chat-id-status err';
        chatIdStatus.textContent = '✗ Feedback for this Chat Session ID has already been submitted.';
        chatIdValid = false;
      } else {
        chatIdInput.classList.add('valid');
        chatIdStatus.className = 'chat-id-status ok';
        chatIdStatus.textContent = '✓ Chat Session ID is available.';
        chatIdValid = true;
      }
    } catch {
      chatIdStatus.className = 'chat-id-status checking';
      chatIdStatus.textContent = 'Could not verify — will check on submit.';
      chatIdValid = null;
    }
  }

  // ----------------------------------------------------------
  // Screenshot preview
  // ----------------------------------------------------------
  screenshotInput.addEventListener('change', () => {
    const file = screenshotInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
      screenshotDataUrl  = e.target.result;
      screenshotFilename = file.name;
      previewImg.src     = screenshotDataUrl;
      previewWrap.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  removeBtn.addEventListener('click', () => {
    screenshotDataUrl      = null;
    screenshotFilename     = null;
    screenshotInput.value  = '';
    previewImg.src         = '';
    previewWrap.style.display = 'none';
  });

  // Drag and drop
  const uploadArea = document.getElementById('upload-area');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#4f46e5'; });
  uploadArea.addEventListener('dragleave',  () => { uploadArea.style.borderColor = ''; });
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const dt = new DataTransfer();
      dt.items.add(file);
      screenshotInput.files = dt.files;
      screenshotInput.dispatchEvent(new Event('change'));
    }
  });

  // ----------------------------------------------------------
  // Form submit
  // ----------------------------------------------------------
  form.addEventListener('submit', async e => {
    e.preventDefault();
    hideToast();

    const name     = document.getElementById('name').value.trim();
    const chatId   = chatIdInput.value.trim();
    const category = document.getElementById('category').value;
    const feedback = document.getElementById('feedback').value.trim();

    // Basic validation
    if (!name)     return showToast('error', 'Please select your name.');
    if (!chatId)   return showToast('error', 'Please enter the Chat Session ID.');
    if (!feedback) return showToast('error', 'Please enter your feedback.');
    if (chatIdValid === false) return showToast('error', 'This Chat Session ID has already been submitted.');

    submitBtn.disabled   = true;
    submitBtn.textContent = 'Submitting…';

    try {
      const payload = { name, chatId, category, feedback, screenshot: screenshotDataUrl, screenshotName: screenshotFilename };

      const res  = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body:   JSON.stringify(payload)
        // No Content-Type header — avoids CORS preflight for Apps Script
      });
      const data = await res.json();

      if (data.success) {
        saveNewName(name);
        showToast('success', '✓ Feedback submitted successfully! Thank you.');
        form.reset();
        screenshotDataUrl = null;
        previewWrap.style.display = 'none';
        chatIdInput.classList.remove('valid', 'invalid');
        chatIdStatus.textContent = '';
        chatIdValid = null;
      } else {
        showToast('error', data.error || 'Submission failed. Please try again.');
      }
    } catch {
      showToast('error', 'Network error. Please check your connection and try again.');
    } finally {
      submitBtn.disabled   = false;
      submitBtn.textContent = 'Submit Feedback';
    }
  });

  // ----------------------------------------------------------
  // Toast helpers
  // ----------------------------------------------------------
  function showToast(type, msg) {
    toast.className    = type;
    toast.textContent  = msg;
    toast.style.display = 'block';
    toast.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  function hideToast() {
    toast.style.display = 'none';
  }
</script>
</body>
</html>
